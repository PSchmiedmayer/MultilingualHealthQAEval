name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check src

      - name: Compile Python
        run: python -m compileall src

      - name: Validate notebook JSON
        run: python - <<'PY'
          import json
          from pathlib import Path

          json.loads(Path("notebooks/medical_multilingual_eval.ipynb").read_text())
          print("notebook json ok")
          PY

  reuse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install REUSE
        run: |
          python -m pip install --upgrade pip
          python -m pip install reuse

      - name: Check REUSE compliance
        run: reuse lint
